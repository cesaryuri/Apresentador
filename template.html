<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Template - Novo Slide</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            background-color: #f5f5f5;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            background: white;
            position: relative;
            overflow: hidden;
        }
        /* Paleta de Cores IEEE Spectrum */
        .bg-ieee-blue { background-color: #00629B; }
        .text-ieee-blue { color: #00629B; }
        .bg-ieee-dark { background-color: #002855; }
        .text-ieee-dark { color: #002855; }
        .text-ieee-orange { color: #E37222; }
        .border-ieee-orange { border-color: #E37222; }
        .bg-ieee-gray { background-color: #F3F4F6; }
        .bg-ieee-light { background-color: #E6F0F5; }
    </style>
</head>
<body>
<div class="slide-container">
    
    <div class="w-16 bg-ieee-dark h-full flex flex-col items-center justify-between py-8 z-20 shrink-0">
        <div class="text-white font-bold text-xl">XX</div> <div class="h-1/2 w-0.5 bg-white opacity-20"></div>
        <div class="text-ieee-orange text-2xl"><i class="fas fa-cube"></i></div> </div>

    <div class="flex-1 flex flex-col p-10 relative overflow-hidden bg-white">
        
        <div class="mb-8 z-10">
            <div class="flex items-center space-x-4 mb-2">
                <div class="h-1 w-12 bg-ieee-orange"></div>
                <p class="text-ieee-orange font-bold uppercase tracking-widest text-sm">Subtítulo / Categoria</p>
            </div>
            <h1 class="font-montserrat font-bold text-4xl text-ieee-dark">
                Título do <span class="text-ieee-blue">Slide</span>
            </h1>
        </div>

        <div class="flex-1 flex flex-col relative z-10">
            
            <div class="w-full h-full border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50">
                <p class="text-gray-400 font-semibold text-lg"><i class="fas fa-code mr-2">
